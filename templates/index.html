<!DOCTYPE html>
<html>

<head>
    <title>Finexo</title>
    <link rel="shortcut icon" href="{{ url_for('static', filename='images/favicon.png') }}">
    
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
</head>

<body>
    <!-- header section -->
    <header class="header_section">
        <div class="container-fluid">
            <nav class="navbar navbar-expand-lg custom_nav-container">
                <a class="navbar-brand" href="/index"><span>Finexo</span></a>

                <!-- Hamburger button for mobile -->
                <button class="navbar-toggler" type="button" data-toggle="collapse"
                    data-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav ml-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="/">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/about">About</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/dashboard">
                                <i class="fas fa-chart-bar"></i> My Dashboard
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/logout">
                                <i class="fa fa-user" aria-hidden="true"></i> Log Out
                            </a>
                        </li>
                        <li class="nav-item">
                            <button id="theme-toggle" class="theme-toggle-button">
                                <i class="fas fa-sun" id="sun-icon"></i>
                                <i class="fas fa-moon" id="moon-icon"></i>
                            </button>
                        </li>
                    </ul>
                </div>
            </nav>
        </div>
    </header>
    <!-- end header section -->

    <h1 class="spm left">Email Spam Classifier</h1>
    <div id="result-container" class="right"></div>

    <form action="/predict" method="post" id="prediction-form">
        <textarea id="message" name="message" rows="6" cols="50"
            placeholder="Enter the text...."></textarea><br><br><br>
        <input type="submit" value="Predict" class="predict1">
        <button id="clear-button" type="button" class="clear-text">Clear</button>
    </form>

    <!-- jQuery -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.min.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='index.js') }}"></script>
</body>
</html>
